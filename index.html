<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Log</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2d6a4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HealthLog">
<link rel="apple-touch-icon" href="./icon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ef;
  --surface: #ffffff;
  --surface2: #f0ece4;
  --accent: #2d6a4f;
  --accent2: #52b788;
  --warn: #e07a5f;
  --mid: #f2cc8f;
  --text: #1a1a2e;
  --text-sub: #7a7a8a;
  --border: #e0dbd0;
  --good: #52b788;
  --soso: #f2cc8f;
  --bad: #e07a5f;
  --goal: #2d6a4f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 18px 20px 14px;
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 50;
}
.app-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--accent); letter-spacing: 0.02em; }
.goal-badge {
  font-family: 'DM Mono', monospace; font-size: 0.75rem;
  color: var(--accent); background: #d8f3dc; border-radius: 20px;
  padding: 4px 12px; cursor: pointer; border: 1px solid #b7e4c7;
}

/* Nav */
nav {
  position: fixed; bottom: 0; width: 100%; background: var(--surface);
  border-top: 1px solid var(--border); display: flex; z-index: 50;
  height: 68px;
}
nav button {
  flex: 1; background: none; border: none; color: var(--text-sub);
  font-family: 'DM Sans', sans-serif; font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
}
nav button .nav-icon { font-size: 1.2rem; }
nav button.active { color: var(--accent); border-top: 2px solid var(--accent); }

/* Content */
#content { padding: 20px 16px 90px; max-width: 560px; margin: 0 auto; }
.view { display: none; }
.view.active { display: block; }

/* Today card */
.today-header { font-family: 'DM Serif Display', serif; font-size: 1.05rem; margin-bottom: 16px; color: var(--text-sub); }
.today-header span { color: var(--text); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 14px; }
.card-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-sub); margin-bottom: 14px; }

/* Weight row */
.weight-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.weight-field label { font-size: 0.75rem; color: var(--text-sub); display: block; margin-bottom: 6px; }
.weight-input-wrap { display: flex; align-items: center; gap: 6px; }
.weight-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px;
  font-family: 'DM Mono', monospace; font-size: 1.3rem; color: var(--text);
  outline: none; text-align: center;
}
.weight-input:focus { border-color: var(--accent2); }
.weight-unit { font-size: 0.78rem; color: var(--text-sub); flex-shrink: 0; }

/* Rating row */
.rating-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.rating-field label { font-size: 0.75rem; color: var(--text-sub); display: block; margin-bottom: 8px; }
.rating-chips { display: flex; gap: 6px; }
.chip {
  flex: 1; padding: 8px 4px; border-radius: 8px; border: 1.5px solid var(--border);
  background: transparent; font-size: 1rem; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.chip.good.selected  { background: #d8f3dc; border-color: var(--good); }
.chip.soso.selected  { background: #fef9e7; border-color: var(--soso); }
.chip.bad.selected   { background: #fde8e4; border-color: var(--bad); }

/* Memo */
.memo-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px; font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; color: var(--text); outline: none; resize: none; min-height: 64px;
}
.memo-input:focus { border-color: var(--accent2); }

.save-btn {
  width: 100%; padding: 14px; background: var(--accent); color: white;
  border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem; font-weight: 500; cursor: pointer; margin-top: 4px;
  letter-spacing: 0.03em; transition: background 0.15s;
}
.save-btn:hover { background: #1b4332; }

/* Streak summary */
.streak-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.streak-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 10px; text-align: center;
}
.streak-val { font-family: 'DM Mono', monospace; font-size: 1.5rem; display: block; color: var(--accent); }
.streak-lbl { font-size: 0.68rem; color: var(--text-sub); margin-top: 4px; text-transform: uppercase; }

/* Graph */
.graph-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 16px; margin-bottom: 14px; }
.graph-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-sub); margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.graph-range-btns { display: flex; gap: 6px; }
.range-btn { background: transparent; border: 1px solid var(--border); color: var(--text-sub); border-radius: 6px; padding: 3px 10px; font-size: 0.72rem; cursor: pointer; }
.range-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
canvas#weightChart { width: 100% !important; }

/* History list */
.history-item {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start;
}
.history-date { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text-sub); width: 56px; flex-shrink: 0; padding-top: 2px; }
.history-body { flex: 1; }
.history-weights { font-family: 'DM Mono', monospace; font-size: 0.95rem; margin-bottom: 6px; }
.history-icons { display: flex; gap: 8px; margin-bottom: 4px; font-size: 0.8rem; }
.history-memo { font-size: 0.8rem; color: var(--text-sub); line-height: 1.5; }
.history-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 0.9rem; flex-shrink: 0; padding: 2px 4px; }
.history-del:hover { color: var(--bad); }

/* Settings */
.settings-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 14px; }
.settings-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-bottom: 1px solid var(--border); }
.settings-row:last-child { border-bottom: none; }
.settings-label { font-size: 0.88rem; }
.settings-sub { font-size: 0.72rem; color: var(--text-sub); margin-top: 2px; }
.settings-input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 12px; font-family: 'DM Mono', monospace; font-size: 1rem;
  color: var(--text); width: 90px; text-align: center; outline: none;
}
.settings-input:focus { border-color: var(--accent2); }
.danger-btn { background: transparent; border: 1px solid #e07a5f55; color: var(--bad); border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 0.82rem; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal-box { background: var(--surface); border-radius: 20px; padding: 28px 24px; width: 90%; max-width: 340px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.modal-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; margin-bottom: 8px; }
.modal-sub { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 18px; line-height: 1.6; }
.modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-family: 'DM Mono', monospace; font-size: 1.6rem; text-align: center; color: var(--text); outline: none; margin-bottom: 18px; }
.modal-input:focus { border-color: var(--accent2); }
.modal-btns { display: flex; gap: 10px; }
.modal-ok { flex: 1; background: var(--accent); color: white; border: none; border-radius: 10px; padding: 12px; cursor: pointer; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; }
.modal-cancel { flex: 1; background: transparent; color: var(--text-sub); border: 1px solid var(--border); border-radius: 10px; padding: 12px; cursor: pointer; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; }

/* Toast */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: white; padding: 10px 24px; border-radius: 30px; font-size: 0.85rem; opacity: 0; transition: all 0.3s; z-index: 300; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="app-title">Health Log</div>
  <div class="goal-badge" onclick="openGoalModal()" id="goal-badge">目標: — kg</div>
</header>

<div id="content">

  <!-- Today -->
  <div id="view-today" class="view active">
    <div class="today-header" id="today-header">今日の記録</div>

    <div class="streak-row">
      <div class="streak-card"><span class="streak-val" id="streak-days">0</span><span class="streak-lbl">連続日数</span></div>
      <div class="streak-card"><span class="streak-val" id="current-weight">—</span><span class="streak-lbl">今朝の体重</span></div>
      <div class="streak-card"><span class="streak-val" id="diff-goal">—</span><span class="streak-lbl">目標との差</span></div>
    </div>

    <div class="card">
      <div class="card-title">体重 (kg)</div>
      <div class="weight-row">
        <div class="weight-field">
          <label>朝</label>
          <div class="weight-input-wrap">
            <input type="number" step="0.1" class="weight-input" id="w-morning" placeholder="—">
            <span class="weight-unit">kg</span>
          </div>
        </div>
        <div class="weight-field">
          <label>夜</label>
          <div class="weight-input-wrap">
            <input type="number" step="0.1" class="weight-input" id="w-evening" placeholder="—">
            <span class="weight-unit">kg</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">食事・運動</div>
      <div class="rating-row">
        <div class="rating-field">
          <label>🍽 食事</label>
          <div class="rating-chips" id="chips-meal">
            <button class="chip good" data-group="meal" data-val="good" onclick="selectChip(this)">○</button>
            <button class="chip soso" data-group="meal" data-val="soso" onclick="selectChip(this)">△</button>
            <button class="chip bad"  data-group="meal" data-val="bad"  onclick="selectChip(this)">×</button>
          </div>
        </div>
        <div class="rating-field">
          <label>🏃 運動</label>
          <div class="rating-chips" id="chips-exercise">
            <button class="chip good" data-group="exercise" data-val="good" onclick="selectChip(this)">○</button>
            <button class="chip soso" data-group="exercise" data-val="soso" onclick="selectChip(this)">△</button>
            <button class="chip bad"  data-group="exercise" data-val="bad"  onclick="selectChip(this)">×</button>
          </div>
        </div>
      </div>
      <label style="font-size:0.75rem;color:var(--text-sub);display:block;margin-bottom:6px;">メモ</label>
      <textarea class="memo-input" id="memo-input" placeholder="今日の気づき、食事内容など…" rows="2"></textarea>
    </div>

    <button class="save-btn" onclick="saveToday()">記録する</button>
  </div>

  <!-- Graph -->
  <div id="view-graph" class="view">
    <div class="graph-wrap">
      <div class="graph-title">
        体重の推移
        <div class="graph-range-btns">
          <button class="range-btn active" onclick="setRange(7,this)">7日</button>
          <button class="range-btn" onclick="setRange(30,this)">30日</button>
          <button class="range-btn" onclick="setRange(90,this)">90日</button>
        </div>
      </div>
      <canvas id="weightChart" height="220"></canvas>
    </div>

    <div id="history-list"></div>
  </div>

  <!-- Settings -->
  <div id="view-settings" class="view">
    <div class="settings-card">
      <div class="settings-row">
        <div>
          <div class="settings-label">目標体重</div>
          <div class="settings-sub">グラフに点線で表示されます</div>
        </div>
        <input type="number" step="0.1" class="settings-input" id="goal-input" placeholder="kg" oninput="saveGoal()">
      </div>
    </div>
    <div style="text-align:center;padding-top:8px;">
      <button class="danger-btn" onclick="clearAll()">すべてのデータを削除</button>
    </div>
  </div>

</div><!-- #content -->

<nav>
  <button id="nav-today" class="active" onclick="switchView('today')">
    <span class="nav-icon">📋</span>今日
  </button>
  <button id="nav-graph" onclick="switchView('graph')">
    <span class="nav-icon">📈</span>グラフ
  </button>
  <button id="nav-settings" onclick="switchView('settings')">
    <span class="nav-icon">⚙️</span>設定
  </button>
</nav>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">目標体重を設定</div>
    <div class="modal-sub">目標体重を入力してください。\nグラフに点線で表示されます。</div>
    <input type="number" step="0.1" class="modal-input" id="modal-goal-input" placeholder="60.0">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="modal-ok" onclick="saveGoalFromModal()">設定する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
var STORE_KEY = 'healthlog_v1';

function defaultData() {
  return { goal: null, records: {} };
  // records: { "YYYY-MM-DD": { wMorning, wEvening, meal, exercise, memo } }
}

function loadData() {
  try { var r = localStorage.getItem(STORE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return defaultData();
}

var data = loadData();
var chartRange = 7;
var chartInstance = null;
var ratings = { meal: null, exercise: null };

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
function todayKey() { return new Date().toISOString().split('T')[0]; }

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

// ── Today View ──────────────────────────────────────────
function initTodayView() {
  var tk = todayKey();
  var d = new Date();
  document.getElementById('today-header').innerHTML =
    '今日の記録 <span>' + d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日</span>';

  var rec = data.records[tk] || {};
  document.getElementById('w-morning').value = rec.wMorning != null ? rec.wMorning : '';
  document.getElementById('w-evening').value = rec.wEvening != null ? rec.wEvening : '';
  document.getElementById('memo-input').value = rec.memo || '';

  ratings.meal = rec.meal || null;
  ratings.exercise = rec.exercise || null;
  restoreChips();
  updateStreak();
}

function restoreChips() {
  ['meal','exercise'].forEach(function(group) {
    document.querySelectorAll('[data-group="'+group+'"]').forEach(function(btn){
      btn.classList.remove('selected');
      if (ratings[group] && btn.dataset.val === ratings[group]) btn.classList.add('selected');
    });
  });
}

function selectChip(btn) {
  var group = btn.dataset.group, val = btn.dataset.val;
  ratings[group] = (ratings[group] === val) ? null : val;
  restoreChips();
}

function updateStreak() {
  // consecutive days with any record
  var keys = Object.keys(data.records).sort().reverse();
  var streak = 0, prev = null;
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    if (prev === null) {
      var today = todayKey();
      if (k === today || k === prevDay(today)) { streak = 1; prev = k; }
      else break;
    } else {
      if (k === prevDay(prev)) { streak++; prev = k; }
      else break;
    }
  }
  document.getElementById('streak-days').textContent = streak;

  // current morning weight
  var latestW = null;
  for (var j = 0; j < keys.length; j++) {
    var r = data.records[keys[j]];
    if (r && r.wMorning != null) { latestW = r.wMorning; break; }
  }
  document.getElementById('current-weight').textContent = latestW != null ? latestW + '' : '—';

  // diff from goal
  if (data.goal != null && latestW != null) {
    var diff = (latestW - data.goal).toFixed(1);
    var sign = diff > 0 ? '+' : '';
    document.getElementById('diff-goal').textContent = sign + diff;
  } else {
    document.getElementById('diff-goal').textContent = '—';
  }
}

function prevDay(dateStr) {
  var d = new Date(dateStr); d.setDate(d.getDate()-1); return d.toISOString().split('T')[0];
}

function saveToday() {
  var tk = todayKey();
  var wm = document.getElementById('w-morning').value;
  var we = document.getElementById('w-evening').value;
  var memo = document.getElementById('memo-input').value.trim();
  if (!data.records[tk]) data.records[tk] = {};
  var rec = data.records[tk];
  if (wm !== '') rec.wMorning = parseFloat(wm); else delete rec.wMorning;
  if (we !== '') rec.wEvening = parseFloat(we); else delete rec.wEvening;
  rec.meal = ratings.meal;
  rec.exercise = ratings.exercise;
  rec.memo = memo;
  save(); updateStreak();
  showToast('記録しました ✓');
}

// ── Graph View ──────────────────────────────────────────
function setRange(n, btn) {
  chartRange = n;
  document.querySelectorAll('.range-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderChart();
}

function renderChart() {
  var keys = Object.keys(data.records).sort();
  // last N days
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate() - chartRange + 1);
  var cutoffStr = cutoff.toISOString().split('T')[0];
  var filtered = keys.filter(function(k){ return k >= cutoffStr; });

  // fill all days in range
  var labels = [], morningData = [], eveningData = [];
  for (var i = 0; i < chartRange; i++) {
    var d = new Date(); d.setDate(d.getDate() - chartRange + 1 + i);
    var dk = d.toISOString().split('T')[0];
    var short = (d.getMonth()+1) + '/' + d.getDate();
    labels.push(short);
    var rec = data.records[dk];
    morningData.push(rec && rec.wMorning != null ? rec.wMorning : null);
    eveningData.push(rec && rec.wEvening != null ? rec.wEvening : null);
  }

  // goal line
  var goalData = labels.map(function(){ return data.goal != null ? data.goal : null; });

  // y axis range
  var allVals = morningData.concat(eveningData).filter(function(v){ return v != null; });
  if (data.goal != null) allVals.push(data.goal);
  var yMin = allVals.length ? Math.floor(Math.min.apply(null,allVals) - 1) : 50;
  var yMax = allVals.length ? Math.ceil(Math.max.apply(null,allVals) + 1) : 80;

  var ctx = document.getElementById('weightChart').getContext('2d');
  if (chartInstance) { chartInstance.destroy(); }
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: '朝',
          data: morningData,
          borderColor: '#2d6a4f',
          backgroundColor: 'rgba(45,106,79,0.08)',
          pointBackgroundColor: '#2d6a4f',
          pointRadius: 4, pointHoverRadius: 6,
          borderWidth: 2, tension: 0.3, spanGaps: true
        },
        {
          label: '夜',
          data: eveningData,
          borderColor: '#52b788',
          backgroundColor: 'rgba(82,183,136,0.06)',
          pointBackgroundColor: '#52b788',
          pointRadius: 4, pointHoverRadius: 6,
          borderWidth: 2, tension: 0.3, spanGaps: true,
          borderDash: [4,3]
        },
        {
          label: '目標',
          data: goalData,
          borderColor: '#e07a5f',
          borderWidth: 1.5, borderDash: [6,4],
          pointRadius: 0, spanGaps: true,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { font: { family: 'DM Sans', size: 12 }, color: '#7a7a8a', boxWidth: 14 } },
        tooltip: { callbacks: { label: function(ctx){ return ctx.dataset.label + ': ' + ctx.parsed.y + ' kg'; } } }
      },
      scales: {
        x: { grid: { color: '#f0ece4' }, ticks: { font: { family: 'DM Mono', size: 10 }, color: '#7a7a8a', maxRotation: 0 } },
        y: { min: yMin, max: yMax, grid: { color: '#f0ece4' }, ticks: { font: { family: 'DM Mono', size: 10 }, color: '#7a7a8a', callback: function(v){ return v + 'kg'; } } }
      }
    }
  });
}

function ratingLabel(val) {
  if (val === 'good') return '○';
  if (val === 'soso') return '△';
  if (val === 'bad')  return '×';
  return '—';
}
function ratingColor(val) {
  if (val === 'good') return '#52b788';
  if (val === 'soso') return '#c9a227';
  if (val === 'bad')  return '#e07a5f';
  return '#bbb';
}

function renderHistory() {
  var container = document.getElementById('history-list');
  var keys = Object.keys(data.records).sort().reverse();
  if (!keys.length) { container.innerHTML = '<div style="text-align:center;color:var(--text-sub);padding:30px;font-size:0.88rem;">記録がありません</div>'; return; }
  container.innerHTML = '';
  keys.forEach(function(dk) {
    var rec = data.records[dk];
    var d = new Date(dk);
    var dateStr = (d.getMonth()+1) + '/' + d.getDate();
    var wText = '';
    if (rec.wMorning != null) wText += '朝 ' + rec.wMorning + 'kg';
    if (rec.wMorning != null && rec.wEvening != null) wText += '　';
    if (rec.wEvening != null) wText += '夜 ' + rec.wEvening + 'kg';
    if (!wText) wText = '体重未記録';

    var item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML =
      '<div class="history-date">' + dateStr + '</div>' +
      '<div class="history-body">' +
        '<div class="history-weights">' + wText + '</div>' +
        '<div class="history-icons">' +
          '<span style="color:' + ratingColor(rec.meal) + '">食事 ' + ratingLabel(rec.meal) + '</span>' +
          '<span style="margin:0 4px;color:var(--border)">|</span>' +
          '<span style="color:' + ratingColor(rec.exercise) + '">運動 ' + ratingLabel(rec.exercise) + '</span>' +
        '</div>' +
        (rec.memo ? '<div class="history-memo">' + escHtml(rec.memo) + '</div>' : '') +
      '</div>' +
      '<button class="history-del" onclick="deleteRecord(\'' + dk + '\')" title="削除">✕</button>';
    container.appendChild(item);
  });
}

function deleteRecord(dk) {
  if (!confirm(dk + ' の記録を削除しますか？')) return;
  delete data.records[dk]; save(); renderHistory(); renderChart(); updateStreak();
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Settings ────────────────────────────────────────────
function initSettings() {
  document.getElementById('goal-input').value = data.goal != null ? data.goal : '';
  document.getElementById('goal-input').oninput = saveGoal;
}

function saveGoal() {
  var v = parseFloat(document.getElementById('goal-input').value);
  data.goal = isNaN(v) ? null : v;
  save(); updateGoalBadge(); updateStreak();
}

function updateGoalBadge() {
  document.getElementById('goal-badge').textContent = '目標: ' + (data.goal != null ? data.goal + ' kg' : '— kg');
}

function openGoalModal() {
  document.getElementById('modal-goal-input').value = data.goal != null ? data.goal : '';
  document.getElementById('modal-overlay').classList.add('active');
  setTimeout(function(){ document.getElementById('modal-goal-input').focus(); }, 100);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

function saveGoalFromModal() {
  var v = parseFloat(document.getElementById('modal-goal-input').value);
  data.goal = isNaN(v) ? null : v;
  save(); updateGoalBadge(); updateStreak();
  closeModal();
  if (data.goal != null) showToast('目標体重を設定しました ✓');
}

function clearAll() {
  if (!confirm('すべてのデータを削除します。よろしいですか？')) return;
  localStorage.removeItem(STORE_KEY);
  data = defaultData(); save();
  updateGoalBadge(); initTodayView(); updateStreak();
  showToast('データを削除しました');
}

// ── Nav ─────────────────────────────────────────────────
function switchView(name) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('nav button').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name === 'graph') { renderChart(); renderHistory(); }
  if (name === 'settings') initSettings();
}

// ── Init ────────────────────────────────────────────────
updateGoalBadge();
initTodayView();

// ── PWA ─────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  });
}
</script>
